<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FBF7F1"/>
      <stop offset="100%" stop-color="#F2EDE3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#C21E38"/>
      <stop offset="100%" stop-color="#8E0F22"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Red top bar -->
  <rect x="0" y="0" width="1200" height="92" fill="url(#accent)"/>

  <!-- Brand mark (square with A) -->
  <rect x="72" y="24" width="44" height="44" fill="#FFFFFF"/>
  <text x="94" y="60" fill="#C21E38" font-family="Montserrat, Arial, sans-serif" font-weight="900" font-size="30" text-anchor="middle">A</text>

  <!-- Brand name -->
  <text x="132" y="60" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-weight="900" font-size="32" letter-spacing="-1">Arthlens</text>

  <!-- Section tag -->
  <rect x="268" y="32" width="140" height="28" fill="#FFFFFF" fill-opacity="0.2"/>
  <text x="338" y="52" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="12" letter-spacing="1.8" text-anchor="middle">GLOBAL EDITORIAL</text>

  <!-- Left red rule -->
  <rect x="72" y="162" width="48" height="6" fill="#C21E38"/>

  <!-- Kicker -->
  <text x="72" y="198" fill="#C21E38" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="16" letter-spacing="2.2">INDEPENDENT · 22 COUNTRIES · EDITORIAL</text>

  <!-- Headline -->
  <text x="72" y="290" fill="#0E1116" font-family="Montserrat, Arial, sans-serif" font-weight="900" font-size="78" letter-spacing="-2">Global editorial</text>
  <text x="72" y="374" fill="#0E1116" font-family="Montserrat, Arial, sans-serif" font-weight="900" font-size="78" letter-spacing="-2">guides for every</text>
  <text x="72" y="458" fill="#C21E38" font-family="Montserrat, Arial, sans-serif" font-weight="900" font-size="78" letter-spacing="-2">country.</text>

  <!-- Deck -->
  <text x="72" y="518" fill="#3A3F4A" font-family="Source Sans 3, Arial, sans-serif" font-weight="400" font-size="26">Money · Family · Travel · Lifestyle — curated by country, language</text>
  <text x="72" y="554" fill="#3A3F4A" font-family="Source Sans 3, Arial, sans-serif" font-weight="400" font-size="26">and local context. Not a bank. Not a broker. Just editorial.</text>

  <!-- Flag strip (22 flag emojis as a hint) -->
  <text x="72" y="608" fill="#6B6458" font-family="Arial, sans-serif" font-size="20" letter-spacing="2">🇦🇪 🇦🇺 🇧🇪 🇧🇷 🇨🇦 🇨🇭 🇩🇪 🇩🇰 🇫🇷 🇮🇪 🇮🇱 🇯🇵 🇰🇷 🇲🇽 🇳🇱 🇳🇴 🇳🇿 🇸🇦 🇸🇪 🇸🇬 🇬🇧 🇺🇸</text>

  <!-- URL bottom-right -->
  <text x="1128" y="608" fill="#6B6458" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="18" letter-spacing="1.5" text-anchor="end">ARTHLENS.EXAMPLE</text>
</svg>
